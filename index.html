<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Freddo Games Gratis APK</title>
<!-- Google Fonts voor een moderne look -->
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet" />
<style>
  body {
    margin: 0;
    font-family: 'Roboto', sans-serif;
    background: linear-gradient(135deg, #74ebd5 0%, #ACB6E5 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    min-height: 100vh;
    padding: 20px;
  }

  h1 {
    color: #fff;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    margin-bottom: 20px;
  }

  .input-group {
    display: flex;
    margin-bottom: 20px;
    width: 100%;
    max-width: 500px;
  }

  input[type="text"] {
    flex: 1;
    padding: 15px;
    border: none;
    border-radius: 8px 0 0 8px;
    font-size: 16px;
  }

  button {
    padding: 15px 20px;
    border: none;
    background-color: #ff6f61;
    color: #fff;
    font-size: 16px;
    border-radius: 0 8px 8px 0;
    cursor: pointer;
    transition: background-color 0.3s, transform 0.2s;
  }

  button:hover {
    background-color: #ff3b2e;
    transform: scale(1.05);
  }

  .buttons-container {
    display: flex;
    gap: 20px;
    margin-bottom: 40px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .action-btn {
    padding: 15px 25px;
    font-size: 18px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
  }

  .download-btn {
    background-color: #4CAF50;
    color: white;
  }

  .download-btn:hover {
    background-color: #45a049;
    transform: translateY(-2px);
  }

  .play-btn {
    background-color: #2196F3;
    color: white;
  }

  .play-btn:hover {
    background-color: #0b7dda;
    transform: translateY(-2px);
  }

  /* Animatie voor lijst van APK links */
  .apk-list {
    max-width: 700px;
    width: 100%;
    background: rgba(255,255,255,0.8);
    border-radius: 15px;
    padding: 20px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.2);
  }

  .apk-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid #ccc;
    animation: fadeIn 0.5s ease;
  }

  @keyframes fadeIn {
    from {opacity: 0; transform: translateY(-10px);}
    to {opacity: 1; transform: translateY(0);}
  }

  /* Responsiveness */
  @media(max-width: 600px){
    .input-group {
      flex-direction: column;
    }
    input[type="text"] {
      border-radius: 8px;
      margin-bottom: 10px;
    }
  }
</style>
</head>
<body>

<h1>Freddo Games Gratis APK</h1>

<!-- Voeg APK link toe -->
<div class="input-group">
  <input type="text" id="apkLink" placeholder="Voeg APK link toe..." />
  <button onclick="addApk()">Toevoegen</button>
</div>

<!-- Knoppen voor acties -->
<div class="buttons-container">
  <button class="action-btn download-btn" onclick="downloadApk()">Download APK</button>
  <button class="action-btn play-btn" onclick="playGame()">Speel nu</button>
</div>

<!-- Lijst met APK links -->
<div class="apk-list" id="apkList">
  <h3>Toegevoegde APK's</h3>
  <!-- Dynamisch gevuld -->
</div>

<script>
  const apkArray = [];

  function addApk() {
    const linkInput = document.getElementById('apkLink');
    const link = linkInput.value.trim();
    if(link) {
      apkArray.push(link);
      updateApkList();
      linkInput.value = '';
    } else {
      alert('Voer een geldige APK-link in.');
    }
  }

  function updateApkList() {
    const listContainer = document.getElementById('apkList');
    listContainer.innerHTML = '<h3>Toegevoegde APK\'s</h3>';
    apkArray.forEach((apk, index) => {
      const div = document.createElement('div');
      div.className = 'apk-item';
      div.innerHTML = `
        <span>APK ${index + 1}</span>
        <div>
          <button onclick="downloadApk('${apk}')">Download</button>
          <button onclick="playGame('${apk}')">Spelen</button>
        </div>
      `;
      listContainer.appendChild(div);
    });
  }

  function downloadApk(apkLink) {
    if(apkLink) {
      window.open(apkLink, '_blank');
    } else {
      alert('Geen APK-link gevonden.');
    }
  }

  function playGame() {
    alert('Start het spel of de game vanaf hier!');
    // Voeg hier je spel- of game-start functionaliteit toe
  }
</script>

</body>
</html>
