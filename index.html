<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Trampoline Spring Spel</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <h1>Trampoline Spring Spel</h1>
  <p>Spring zo hoog mogelijk zonder te vallen! Score: <span id="score">0</span></p>
  <canvas id="gameCanvas"></canvas>
  <button id="startBtn">Start Spel</button>
  <button id="adminBtn" class="admin-btn">Admin</button>

  <!-- Login Modal -->
  <div id="login-modal" class="modal">
    <div class="modal-content">
      <span class="close" id="close-login">&times;</span>
      <h3>Admin Login</h3>
      <form id="login-form">
        <input type="text" id="username" placeholder="Username" required />
        <input type="password" id="password" placeholder="Password" required />
        <button type="submit">Login</button>
      </form>
    </div>
  </div>

  <!-- Admin Dashboard Modal -->
  <div id="admin-modal" class="modal">
    <div class="modal-content large">
      <span class="close" id="close-admin">&times;</span>
      <h3>Admin Dashboard</h3>
      <div id="admin-message"></div>
      <button id="logoutBtn">Logout</button>
      <h4>Speler Instellingen</h4>
      <label>Springkracht: <input type="range" id="springPower" min="5" max="30" value="15" /></label>
      <br/>
      <button id="saveSettings">Opslaan</button>
      <h4>Huidige Score: <span id="adminScore">0</span></h4>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
