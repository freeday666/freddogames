<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Modern Penalty Kick Game</title>
<!-- Google Fonts voor een modern lettertype -->
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet" />
<style>
  /* Reset en basis */
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: 'Roboto', sans-serif;
    background: linear-gradient(135deg, #89f7fe 0%, #66a6ff 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
    color: #fff;
  }

  /* Header */
  header {
    text-align: center;
    margin-bottom: 20px;
  }

  header h1 {
    font-size: 2.5em;
    margin-bottom: 10px;
  }

  /* Score */
  #score-container {
    font-size: 1.5em;
    background: rgba(255,255,255,0.2);
    padding: 10px 20px;
    border-radius: 15px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    margin-bottom: 30px;
    transition: background 0.3s;
  }

  /* Game sectie */
  section#game {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Speelveld */
  #field {
    position: relative;
    width: 100%;
    max-width: 500px;
    height: 600px;
    background: linear-gradient(to top, #3b873e, #4CAF50);
    border-radius: 20px;
    box-shadow: inset 0 0 20px rgba(0,0,0,0.2);
    overflow: hidden;
    margin-bottom: 30px;
  }

  /* Doel */
  #goal {
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 200px;
    height: 30px;
    background: #fff;
    border-radius: 15px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    border: 3px solid #333;
  }

  /* Bal */
  #ball {
    position: absolute;
    width: 40px;
    height: 40px;
    background-color: #222;
    border-radius: 50%;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    cursor: pointer;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    transition: all 0.5s ease;
  }

  /* Doelwit */
  #target {
    position: absolute;
    top: 120px;
    width: 60px;
    height: 60px;
    background-color: #e33;
    border-radius: 50%;
    border: 3px solid #fff;
    cursor: pointer;
    left: calc(50% - 30px);
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    transition: transform 0.3s, box-shadow 0.3s;
  }

  #target:hover {
    transform: scale(1.1);
    box-shadow: 0 8px 16px rgba(0,0,0,0.3);
  }

  /* Knoppen en tekst */
  #controls {
    display: flex;
    gap: 15px;
  }

  button {
    padding: 12px 25px;
    font-size: 1em;
    font-weight: 700;
    border: none;
    border-radius: 10px;
    background: #fff;
    color: #333;
    cursor: pointer;
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    transition: background 0.3s, transform 0.2s;
  }

  button:hover {
    background: #ddd;
    transform: translateY(-2px);
  }

  /* Animatie voor de bal */
  @keyframes shoot {
    from { transform: translateX(0) translateY(0); }
    to { transform: translateX(var(--target-x)) translateY(-600px); }
  }

</style>
</head>
<body>

<header>
  <h1>Modern Penalty Kick Game</h1>
</header>

<div id="score-container">
  Score: <span id="score">0</span>
</div>

<section id="game">
  <div id="field">
    <div id="goal"></div>
    <div id="ball"></div>
    <div id="target"></div>
  </div>
  <div id="controls">
    <button id="shootBtn">Schiet!</button>
    <button id="resetBtn">Reset Score</button>
  </div>
</section>

<script>
  // Elementen
  const ball = document.getElementById('ball');
  const target = document.getElementById('target');
  const scoreSpan = document.getElementById('score');
  const shootBtn = document.getElementById('shootBtn');
  const resetBtn = document.getElementById('resetBtn');

  let score = 0;
  let isShooting = false;

  // Functie om score te updaten
  function updateScore() {
    scoreSpan.textContent = score;
  }

  // Reset score
  resetBtn.onclick = () => {
    score = 0;
    updateScore();
    alert('Score gereset!');
  };

  // Functie om te schieten
  function shoot() {
    if (isShooting) return; // voorkomen dubbele schoten

    isShooting = true;

    // Bepaal willekeurig doelwit x positie
    const maxX = document.getElementById('field').clientWidth - ball.offsetWidth;
    const targetX = Math.random() * maxX;
    target.style.left = `${targetX + 30}px`; // met marge voor doelwit

    // Bereken verschuiving voor animatie
    const deltaX = targetX + 20 - (document.getElementById('field').clientWidth/2 - 20);
    // zet CSS variabele voor animatie
    ball.style.setProperty('--target-x', `${deltaX}px`);

    // Start animatie
    ball.style.animation = 'none'; // reset
    void ball.offsetWidth; // force reflow
    ball.style.animation = 'shoot 1s forwards';

    // Na de animatie, check of goal
    setTimeout(() => {
      checkGoal(targetX);
      // Reset bal positie
      ball.style.transform = '';
      ball.style.left = '50%';
      ball.style.bottom = '20px';
      ball.style.animation = '';
      isShooting = false;
    }, 1000);
  }

  // Check of de bal in de goal ligt
  function checkGoal(targetX) {
    const goalX = document.getElementById('goal').offsetLeft;
    const goalWidth = document.getElementById('goal').offsetWidth;

    // Bal in doel?
    if (
      targetX + 20 > goalX &&
      targetX + 20 + 60 < goalX + goalWidth
    ) {
      alert('🎉 GOAL! 🎉');
      score++;
      updateScore();
    } else {
      alert('Helaas, mis!');
    }
  }

  // Event listeners
document.getElementById('shootBtn').onclick = shoot;

// Optioneel: klik op doelwit om te schieten
// target.onclick = shoot;
</script>

</body>
</html>
