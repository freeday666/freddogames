<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FPS Shooter Game</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background: #222;
  }
  #gameCanvas {
    width: 100vw;
    height: 100vh;
    display: block;
    background: #444;
  }
  /* Bediening buttons */
  #controls {
    position: absolute;
    bottom: 10px;
    width: 100%;
    display: flex;
    justify-content: space-around;
    z-index: 10;
  }
  button {
    padding: 10px 20px;
    font-size: 16px;
    opacity: 0.8;
  }
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>
<div id="controls">
  <button id="moveLeft">Links</button>
  <button id="moveRight">Rechts</button>
  <button id="reload">Herlaad</button>
  <button id="fire">Schiet</button>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// Speler object
const player = {
  x: canvas.width/2,
  y: canvas.height - 50,
  width: 40,
  height: 20,
  speed: 5,
  ammo: 6,
  maxAmmo: 6,
  reloadTime: 2000,
  reloading: false
};

// Vuren
let bullets = [];
// Vijanden (dummy)
const enemies = [
  {x: 100, y: 50, width: 40, height: 40},
  {x: 300, y: 70, width: 40, height: 40}
];

// Bewegings flags
let moveLeft = false;
let moveRight = false;

// Buttons
document.getElementById('moveLeft').addEventListener('touchstart', () => { moveLeft = true; });
document.getElementById('moveLeft').addEventListener('touchend', () => { moveLeft = false; });
document.getElementById('moveRight').addEventListener('touchstart', () => { moveRight = true; });
document.getElementById('moveRight').addEventListener('touchend', () => { moveRight = false; });
document.getElementById('fire').addEventListener('touchstart', fire);
document.getElementById('reload').addEventListener('touchstart', reload);

// Fysieke toetsenbordinvoer voor desktop
window.addEventListener('keydown', (e) => {
  if(e.key === 'ArrowLeft') moveLeft = true;
  if(e.key === 'ArrowRight') moveRight = true;
});
window.addEventListener('keyup', (e) => {
  if(e.key === 'ArrowLeft') moveLeft = false;
  if(e.key === 'ArrowRight') moveRight = false;
});

// Schieten functie
function fire() {
  if(player.ammo > 0 && !player.reloading) {
    bullets.push({x: player.x + player.width/2, y: player.y, vy: -8});
    player.ammo--;
  }
}

// Herlaad functie
function reload() {
  if(!player.reloading && player.ammo < player.maxAmmo) {
    player.reloading = true;
    setTimeout(() => {
      player.ammo = player.maxAmmo;
      player.reloading = false;
    }, player.reloadTime);
  }
}

// Spel loop
function gameLoop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  // Beweeg speler
  if(moveLeft && player.x > 0) player.x -= player.speed;
  if(moveRight && player.x + player.width < canvas.width) player.x += player.speed;
  
  // Teken speler
  ctx.fillStyle = 'blue';
  ctx.fillRect(player.x, player.y, player.width, player.height);
  
  // Teken bullets
  ctx.fillStyle = 'red';
  bullets.forEach((b, index) => {
    b.y += b.vy;
    ctx.fillRect(b.x - 5, b.y, 10, 20);
    // Verwijder bullets buiten scherm
    if(b.y < 0) bullets.splice(index,1);
    
    // Check op botsing met vijanden
    enemies.forEach((enemy, eIndex) => {
      if(b.x > enemy.x && b.x < enemy.x + enemy.width && b.y < enemy.y + enemy.height && b.y > enemy.y) {
        // Vijand geraakt
        enemies.splice(eIndex,1);
        bullets.splice(index,1);
      }
    });
  });
  
  // Teken vijanden
  ctx.fillStyle = 'green';
  enemies.forEach(enemy => {
    ctx.fillRect(enemy.x, enemy.y, enemy.width, enemy.height);
  });
  
  // Ammo display
  ctx.fillStyle = 'white';
  ctx.font = '20px Arial';
  ctx.fillText('Ammo: ' + player.ammo, 20, 30);
  if(player.reloading) {
    ctx.fillText('Herlaad...', 20, 60);
  }
  
  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
