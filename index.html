<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Freddo Games - Modern Game Website</title>
<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet" />
<style>
  /* Reset en basis styles */
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    background-size: 600% 600%;
    animation: backgroundGradient 15s ease infinite;
    color: #fff;
    line-height: 1.6;
  }

  @keyframes backgroundGradient {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
  }

  header {
    padding: 20px;
    text-align: center;
    background: rgba(0,0,0,0.3);
  }

  header h1 {
    font-family: 'Poppins', sans-serif;
    font-weight: 700;
    font-size: 2.5rem;
    color: #ffd700;
    letter-spacing: 2px;
  }

  nav {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 15px;
  }

  nav button {
    background: #ffd700;
    color: #000;
    border: none;
    padding: 10px 20px;
    border-radius: 30px;
    cursor: pointer;
    font-weight: 600;
    transition: background 0.3s;
  }

  nav button:hover {
    background: #e6c200;
  }

  .container {
    padding: 20px;
  }

  /* Game sectie styles */
  .games {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
  }

  .game-card {
    background: rgba(255,255,255,0.1);
    border-radius: 15px;
    padding: 15px;
    text-align: center;
    backdrop-filter: blur(10px);
    transition: transform 0.3s, box-shadow 0.3s;
  }

  .game-card:hover {
    transform: scale(1.05);
    box-shadow: 0 0 15px #ffd700;
  }

  .game-card img {
    width: 100%;
    border-radius: 10px;
    margin-bottom: 10px;
  }

  /* Game section styles */
  .section {
    margin-top: 30px;
  }

  h2 {
    text-align: center;
    margin-bottom: 15px;
    font-size: 2rem;
    color: #ffd700;
  }

  /* Game play area */
  #gameArea {
    margin-top: 20px;
    background: rgba(0,0,0,0.2);
    padding: 20px;
    border-radius: 15px;
    text-align: center;
  }

  /* Score en level */
  .scoreboard {
    display: flex;
    justify-content: space-around;
    margin-top: 15px;
    font-size: 1.2rem;
  }

  /* Buttons */
  .btn {
    padding: 10px 20px;
    background-color: #ffd700;
    border: none;
    border-radius: 20px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 10px;
    transition: background 0.3s;
  }

  .btn:hover {
    background-color: #e6c200;
  }

  /* Footer */
  footer {
    text-align: center;
    padding: 15px;
    background: rgba(0,0,0,0.3);
    margin-top: 40px;
    font-size: 1rem;
  }

  /* Animatie voor niveaus en scores */
  .hidden {
    display: none;
  }
</style>
</head>
<body>

<header>
  <h1>Freddo Games</h1>
  <nav>
    <button onclick="showSection('penalty')">Penalty Football ⚽️</button>
    <button onclick="showSection('tennis')">Tennis 🎾</button>
    <button onclick="showSection('bot')">Tegen Bot 🤖</button>
    <button onclick="showSection('games')">Random Games 🎮</button>
  </nav>
</header>

<div class="container">

  <!-- Penalty Football -->
  <section id="penalty" class="section">
    <h2>Penalty Football ⚽️</h2>
    <div id="penaltyGame">
      <p>Score: <span id="penaltyScore">0</span></p>
      <button class="btn" onclick="playPenalty()">Neem Penalty</button>
    </div>
  </section>

  <!-- Tennis -->
  <section id="tennis" class="section hidden">
    <h2>Tennis 🎾</h2>
    <div id="tennisGame">
      <p>Score: <span id="tennisScore">0</span></p>
      <button class="btn" onclick="playTennis()">Speel Tennis</button>
    </div>
  </section>

  <!-- Tegen Bot -->
  <section id="bot" class="section hidden">
    <h2>Tegen Bot 🤖</h2>
    <div id="botGame">
      <p>Score: <span id="botScore">0</span></p>
      <button class="btn" onclick="playBotGame()">Start Spel</button>
    </div>
  </section>

  <!-- Random Games -->
  <section id="games" class="section hidden">
    <h2>Random Games 🎮</h2>
    <div class="games">
      <div class="game-card">
        <img src="https://images.unsplash.com/photo-1612294687167-7b44c4a6f35e" alt="Action Game"/>
        <h3>Actie Game</h3>
        <button class="btn" onclick="startRandomGame('Actie')">Start Actie</button>
      </div>
      <div class="game-card">
        <img src="https://images.unsplash.com/photo-1612294687172-0b8f0b8b3a4b" alt="3D Game"/>
        <h3>3D Game</h3>
        <button class="btn" onclick="startRandomGame('3D')">Start 3D</button>
      </div>
      <div class="game-card">
        <img src="https://images.unsplash.com/photo-1612294687167-7b44c4a6f35e" alt="Simulation"/>
        <h3>Simulatie</h3>
        <button class="btn" onclick="startRandomGame('Simulatie')">Start Simulatie</button>
      </div>
    </div>
  </section>

  <!-- Game Play Area -->
  <div id="gameArea" class="section">
    <h2 id="gameTitle">Welkom! Kies een game om te spelen.</h2>
    <div id="gameContent"></div>
    <div class="scoreboard">
      <div>Level: <span id="level">1</span></div>
      <div>Scores: <span id="score">0</span></div>
    </div>
  </div>

</div>

<footer>
  &copy; 2024 Freddo Games. Alle rechten voorbehouden.
</footer>

<script>
  // Functie om secties te tonen en anderen te verbergen
  function showSection(sectionId) {
    const sections = ['penalty', 'tennis', 'bot', 'games'];
    sections.forEach(id => {
      document.getElementById(id).classList.toggle('hidden', id !== sectionId);
    });
  }

  // Scores en levels voor penalty
  let penaltyScore = 0;
  function playPenalty() {
    const success = Math.random() > 0.3; // 70% kans om te scoren
    if (success) {
      penaltyScore++;
      document.getElementById('penaltyScore').innerText = penaltyScore;
    }
  }

  // Tennis game
  let tennisScore = 0;
  function playTennis() {
    const success = Math.random() > 0.4; // 60% kans
    if (success) {
      tennisScore++;
      document.getElementById('tennisScore').innerText = tennisScore;
    }
  }

  // Tegen bot
  let botScore = 0;
  function playBotGame() {
    const botPlay = Math.random();
    const playerSuccess = Math.random();
    if (playerSuccess > botPlay) {
      botScore++;
    }
    document.getElementById('botScore').innerText = botScore;
  }

  // Willekeurige games
  let currentLevel = 1;
  let currentScore = 0;

  function startRandomGame(gameType) {
    document.getElementById('gameTitle').innerText = "Aan het spelen: " + gameType;
    // Simuleer een game met levels en scores
    currentLevel = 1;
    currentScore = 0;
    updateGameDisplay();
    // Simuleer gameplay
    simulateGame();
  }

  function simulateGame() {
    const gameInterval = setInterval(() => {
      // Verhoog level en score
      currentScore += Math.floor(Math.random() * 10) + 1;
      if (currentScore >= 50) {
        currentLevel++;
        currentScore = 0;
        alert("Level Up! Je bent nu level " + currentLevel);
      }
      updateGameDisplay();

      // Stop na 5 minuten of na een bepaald punt
      if (currentLevel > 5) {
        clearInterval(gameInterval);
        alert("Game Over! Je hebt de hoogste level bereikt.");
      }
    }, 2000);
  }

  function updateGameDisplay() {
    document.getElementById('level').innerText = currentLevel;
    document.getElementById('score').innerText = currentScore;
  }
</script>

</body>
</html>
