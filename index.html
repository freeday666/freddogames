<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mijn Game Website</title>
    <style>
        /* Basis styling */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background-color: #0b0e14; /* Donkere gaming achtergrond */
            color: white;
            text-align: center;
        }

        header {
            background-color: #1a1f29;
            padding: 20px;
            border-bottom: 3px solid #ff4757;
        }

        /* Hero sectie */
        .hero {
            padding: 100px 20px;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://via.placeholder.com/1920x1080'); /* Vervang door je eigen game art */
            background-size: cover;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* De Download Knop */
        .download-btn {
            display: inline-block;
            background-color: #ff4757;
            color: white;
            padding: 20px 40px;
            font-size: 1.5rem;
            font-weight: bold;
            text-decoration: none;
            border-radius: 5px;
            transition: transform 0.2s, background-color 0.2s;
            box-shadow: 0 5px 15px rgba(255, 71, 87, 0.4);
            margin-top: 20px;
        }

        .download-btn:hover {
            background-color: #ff6b81;
            transform: scale(1.05);
        }

        .download-btn:active {
            transform: scale(0.95);
        }

        footer {
            margin-top: 50px;
            padding: 20px;
            font-size: 0.8rem;
            color: #57606f;
        }
    </style>
</head>
<body>

    <header>
        <nav>
            <strong>GAME LOGO</strong>
        </nav>
    </header>

    <section class="hero">
        <h1>Welkom bij Mijn Game</h1>
        <p>Ervaar de meest intense actie van 2026. Gratis te spelen!</p>
        
        <a href="https://play.google.com/store/apps/details?id=com.ubisoft.rainbowsixmobile.r6.fps.pvp.shooter" download class="download-btn">
            DOWNLOAD NU (ZIP)
        </a>
    </section>

    <footer>
        &copy; 2026 Mijn Game Studio | Alle rechten voorbehouden.
    </footer>

</body>
</html>
