<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Freddo Games</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #333;
            color: #fff;
            padding: 15px;
            text-align: center;
        }
        nav {
            background-color: #444;
            display: flex;
            justify-content: center;
        }
        nav a {
            color: white;
            padding: 14px 20px;
            text-decoration: none;
        }
        nav a:hover {
            background-color: #555;
        }
        .container {
            padding: 20px;
        }
        .category {
            margin-top: 20px;
        }
        /* Simple styling for forms */
        form {
            max-width: 300px;
            margin: auto;
        }
        input[type=text], input[type=password], input[type=email] {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
        }
        button {
            padding: 10px 20px;
            background-color: #333;
            color: #fff;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #555;
        }
        /* Admin panel styling */
        .admin-panel {
            margin-top: 20px;
            border: 1px solid #ccc;
            padding: 10px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            border: 1px solid #ccc;
            padding: 8px;
            text-align: left;
        }
        /* Game category styling */
        .games {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .game {
            border: 1px solid #ccc;
            padding: 10px;
            width: calc(25% - 20px);
        }
        @media(max-width: 768px){
            .game {
                width: calc(50% - 20px);
            }
        }
    </style>
</head>
<body>

<header>
    <h1>Freddo Games</h1>
</header>

<nav>
    <a href="#home">Home</a>
    <a href="#games">Games</a>
    <a href="#inloggen">Inloggen</a>
    <a href="#registreren">Registreren</a>
    <a href="#admin">Admin Panel</a>
</nav>

<div class="container" id="home">
    <h2>Welkom bij Freddo Games</h2>
    <p>De leukste games op één plek!</p>
</div>

<div class="container" id="games">
    <h2>Games Categorie</h2>
    <div class="games">
        <div class="game">
            <h3>Freddo Adventure</h3>
            <p>Een spannend avonturenspel.</p>
        </div>
        <div class="game">
            <h3>Freddo Racing</h3>
            <p>Race tegen je vrienden!</p>
        </div>
        <!-- Voeg meer games toe -->
    </div>
</div>

<div class="container" id="inloggen">
    <h2>Inloggen</h2>
    <form>
        <label for="email">E-mail:</label>
        <input type="email" id="email" placeholder="Voer je e-mail in" required />
        <label for="password">Wachtwoord:</label>
        <input type="password" id="password" placeholder="Voer je wachtwoord in" required />
        <button type="submit">Inloggen</button>
    </form>
</div>

<div class="container" id="registreren">
    <h2>Registreren</h2>
    <form>
        <label for="reg-naam">Naam:</label>
        <input type="text" id="reg-naam" placeholder="Je naam" required />
        <label for="reg-email">E-mail:</label>
        <input type="email" id="reg-email" placeholder="Je e-mail" required />
        <label for="reg-wachtwoord">Wachtwoord:</label>
        <input type="password" id="reg-wachtwoord" placeholder="Wachtwoord" required />
        <button type="submit">Registreren</button>
    </form>
</div>

<div class="container" id="admin" style="display:none;">
    <h2>Admin Panel</h2>
    <div class="admin-panel">
        <h3>Games Beheer</h3>
        <form id="add-game-form">
            <input type="text" id="game-title" placeholder="Titel game" required />
            <input type="text" id="game-description" placeholder="Beschrijving" required />
            <button type="submit">Toevoegen</button>
        </form>
        <table>
            <thead>
                <tr>
                    <th>Titel</th>
                    <th>Beschrijving</th>
                    <th>Acties</th>
                </tr>
            </thead>
            <tbody id="games-table-body">
                <!-- Games worden hier weergegeven -->
            </tbody>
        </table>
    </div>
</div>

<script>
    // Placeholder script voor demonstratie. Voor echte functionaliteit moet je backend gebruiken.
    document.querySelector('#add-game-form').addEventListener('submit', function(e){
        e.preventDefault();
        const title = document.getElementById('game-title').value;
        const description = document.getElementById('game-description').value;

        const tbody = document.getElementById('games-table-body');
        const row = document.createElement('tr');

        row.innerHTML = `
            <td>${title}</td>
            <td>${description}</td>
            <td>
                <button onclick="editGame(this)">Bewerk</button>
                <button onclick="deleteGame(this)">Verwijder</button>
            </td>
        `;
        tbody.appendChild(row);
        document.getElementById('add-game-form').reset();
    });

    function deleteGame(btn){
        const row = btn.closest('tr');
        row.remove();
    }

    function editGame(btn){
        const row = btn.closest('tr');
        const titleTd = row.children[0];
        const descTd = row.children[1];

        const newTitle = prompt("Nieuwe titel:", titleTd.innerText);
        const newDesc = prompt("Nieuwe beschrijving:", descTd.innerText);

        if(newTitle !== null){
            titleTd.innerText = newTitle;
        }
        if(newDesc !== null){
            descTd.innerText = newDesc;
        }
    }

    // Toegang tot admin panel (voorbeeld: eenvoudige login)
    // In een echte site moet je authenticatie en autorisatie toevoegen
    function showAdminPanel(){
        document.getElementById('admin').style.display = 'block';
    }

    // Voor demo: klik op inloggen om admin te tonen
    document.querySelector('#inloggen form').addEventListener('submit', function(e){
        e.preventDefault();
        // Simpel login simulatie
        alert('Ingelogd! Je hebt toegang tot het admin panel.');
        showAdminPanel();
    });
</script>

</div>

</body>
</html>
