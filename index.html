<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Gebruiker Inloggen & Registratie</title>
<style>
/* Style je formulier hier */
body {
    font-family: Arial, sans-serif;
    background-color: #f0f0f0;
    padding: 50px;
}
form {
    background: #fff;
    padding: 20px;
    border-radius: 8px;
    max-width: 300px;
    margin: auto;
}
input[type=text], input[type=password] {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 4px;
    border: 1px solid #ccc;
}
button {
    width: 100%;
    padding: 10px;
    background-color: #00cc88;
    color: #fff;
    border: none;
    border-radius: 4px;
    cursor: pointer;
}
button:hover {
    background-color: #009d6b;
}
</style>
</head>
<body>

<h2>Registreren</h2>
<form id="registerForm">
    <input type="text" id="regUsername" placeholder="Gebruikersnaam" required />
    <input type="password" id="regPassword" placeholder="Wachtwoord" required />
    <button type="submit">Registreren</button>
</form>

<h2>Inloggen</h2>
<form id="loginForm">
    <input type="text" id="loginUsername" placeholder="Gebruikersnaam" required />
    <input type="password" id="loginPassword" placeholder="Wachtwoord" required />
    <button type="submit">Inloggen</button>
</form>

<script>
    // Registratie
    document.getElementById('registerForm').addEventListener('submit', function(e){
        e.preventDefault();
        const username = document.getElementById('regUsername').value;
        const password = document.getElementById('regPassword').value;

        fetch('register.php', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({username, password})
        })
        .then(res => res.text())
        .then(data => alert(data))
        .catch(err => alert('Fout: ' + err));
    });

    // Inloggen
    document.getElementById('loginForm').addEventListener('submit', function(e){
        e.preventDefault();
        const username = document.getElementById('loginUsername').value;
        const password = document.getElementById('loginPassword').value;

        fetch('login.php', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({username, password})
        })
        .then(res => res.text())
        .then(data => alert(data))
        .catch(err => alert('Fout: ' + err));
    });
</script>

</body>
</html>
